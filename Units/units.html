<!doctype html>
<html lang="en">
  <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Units Example</title>
    <style>
      html {
        color: red;
        font-size: 10px;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #eef2f7;
        font-family: Arial, sans-serif;
      }
      #container {
        width: 100px;
        height: 100px;
        background-color: aquamarine;
        font-size: 3em;
        padding: 10px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #child {
        width: 80%;
        background-color: blue;
        height: 80%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1em;
        border-radius: 50%;
        overflow: hidden;
      }
      #child img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      #child p {
        color: white;
        text-align: center;
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="child">
        <img
          src="https://images.pexels.com/photos/220453/pexels-photo-220453.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=200&w=200"
          alt="Profile image"
        />
      </div>
    </div>
  </body>
</html>
